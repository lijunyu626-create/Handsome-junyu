<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<style>
    body {
        margin: 0;
        background: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
    }
    #text {
        font-size: 50px;
        font-weight: bold;
        color: #ff4500;
        text-align: center;
        animation: breath 2s infinite alternate, entry 1.5s ease-out forwards;
    }
    @keyframes entry {
        from { opacity: 0; transform: translateY(50px) scale(0.8); }
        to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes breath {
        from { text-shadow: 0 0 10px #ff4500; }
        to { text-shadow: 0 0 30px #ffd700, 0 0 60px #ffd700; }
    }
</style>
</head>
<body>

    <div id="text">點開的人是傻逼🫵🏻</div>

</body>
</html>
